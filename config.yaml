# AgentE — Enumeration Orchestrator Configuration
# ─────────────────────────────────────────────────

# Stage 1: Subdomain Enumeration
subdomains:
  subfinder:
    timeout: 300
    extra_args: []
    # extra_args: ["-sources", "crtsh,hackertarget,virustotal", "-rate-limit", "150"]

  subscraper:
    timeout: 300
    extra_args: []

  bbot:
    timeout: 600
    extra_args: []
    # extra_args: ["-m", "crtsh", "dnsx", "hackertarget", "columbus"]

# Stage 2: Validation
validation:
  dnsgen:
    timeout: 120
    wordlist: ""          # path to custom wordlist, or empty to skip -w flag
    extra_args: []

  puredns:
    timeout: 600
    rate_limit: 3000      # DNS queries per second
    resolvers: ""         # path to resolvers.txt, or empty to use built-in
    extra_args: []
    # resolvers: "/opt/wordlists/resolvers.txt"

  httpx:
    timeout: 600
    threads: 50
    probe_timeout: 10     # seconds per HTTP request
    extra_args: []
    # extra_args: ["-screenshot", "-screenshot-timeout", "10"]

# Stage 3: JS & Endpoint Enumeration
js_enum:
  gospider:
    timeout: 600
    threads: 10
    depth: 3
    concurrent: 5
    timeout_per_req: 15
    extra_args: []

  katana:
    timeout: 600
    depth: 3
    concurrency: 10
    timeout_per_req: 15
    extra_args: []
    # extra_args: ["-headless", "-xhr", "-form"]

# Stage 4: Asset Collection & JavaScript Download
collect:
  workers: 10             # concurrent download threads
  timeout: 30            # per-file HTTP timeout (seconds)
  # user_agent: "Mozilla/5.0 ..."   # override the download User-Agent
  prettier:
    enabled: true         # format downloaded JS with Prettier (npx/global prettier)
    timeout: 600          # max seconds for the formatting pass

# Stage 5: Cloud Infrastructure
cloud:
  cloud_enum:
    timeout: 600
    extra_args: []
    # extra_args: ["-l", "/opt/wordlists/cloud_enum_mutations.txt"]

  pycroburst:
    timeout: 600
    mutations: 200
    wordlist: ""          # path to custom wordlist
    extra_args: []

# Stage 6: Email & Username Enumeration
email:
  phonebooks:
    api_key: ""           # optional - get from phonebook.cz
    max_pages: 5

  linkedin2username:
    timeout: 300
    cookie: ""            # LinkedIn li_at session cookie (required)
    extra_args: []
    # extra_args: ["-s", "50", "-sleep", "2"]

# Stage 7: Exposure & Secrets Discovery (LeakIX, Gitminer3, Google dorks)
exposure:
  leakix:
    method: chrome        # "chrome" (Claude + Chrome) or "api" (direct JSON API)
    api_key: ""           # optional leakix.net API key (raises limits)
    permission_mode: acceptEdits
    timeout: 300

  gitminer:
    enabled: true
    github_token: ""      # GitHub PAT; falls back to GITHUB_TOKEN env var
    max_results: 100      # -m: max results per dork
    timeout: 1200

  google_dorks:
    enabled: true         # requires the `claude` CLI with --chrome
    max_dorks: 20         # cap how many dorks to run (0 = all; Google rate-limits)
    batch_size: 5         # dorks per Claude browser task
    permission_mode: acceptEdits
    max_turns: 30         # bound agent iterations per batch
    max_budget_usd: 2.0   # bound spend per batch
    timeout: 600          # per-batch timeout (seconds)

# Global settings
global:
  max_concurrency: 4      # max parallel tool runs
  output_base: "output"   # base directory for all run outputs
