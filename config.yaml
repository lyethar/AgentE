# AgentE — Enumeration Orchestrator Configuration
# ─────────────────────────────────────────────────
# Per-tool `timeout` is in seconds. Set it to 0 (or remove it) for NO timeout —
# the tool then runs to completion before the next stage starts. Long-running
# tools (bbot, cloud_enum, …) should use 0 so they are never killed mid-scan.
# The orchestrator logs which tools are still running every `progress_interval`.

# Stage 1: Subdomain Enumeration
subdomains:
  subfinder:
    timeout: 300
    extra_args: []
    # extra_args: ["-sources", "crtsh,hackertarget,virustotal", "-rate-limit", "150"]

  subscraper:
    timeout: 300
    extra_args: []

  bbot:
    timeout: 0            # no timeout — bbot runs many modules and can take a long time
    extra_args: []
    # extra_args: ["-m", "crtsh", "dnsx", "hackertarget", "columbus"]

# Stage 2: Validation
validation:
  dnsgen:
    timeout: 120
    wordlist: ""          # path to custom wordlist, or empty to skip -w flag
    extra_args: []

  puredns:
    timeout: 600
    rate_limit: 3000      # DNS queries per second
    resolvers: ""         # path to resolvers.txt, or empty to use built-in
    extra_args: []
    # resolvers: "/opt/wordlists/resolvers.txt"

  httpx:
    timeout: 600
    threads: 50
    probe_timeout: 10     # seconds per HTTP request
    extra_args: []
    # extra_args: ["-screenshot", "-screenshot-timeout", "10"]

# Stage 3: JS & Endpoint Enumeration
js_enum:
  gospider:
    timeout: 600
    threads: 10
    depth: 3
    concurrent: 5
    timeout_per_req: 15
    extra_args: []

  katana:
    timeout: 600
    depth: 3
    concurrency: 10
    timeout_per_req: 15
    extra_args: []
    # extra_args: ["-headless", "-xhr", "-form"]

# Stage 4: Asset Collection & JavaScript Download
collect:
  workers: 10             # concurrent download threads
  timeout: 30            # per-file HTTP timeout (seconds)
  # user_agent: "Mozilla/5.0 ..."   # override the download User-Agent
  prettier:
    enabled: true         # format downloaded JS with Prettier (npx/global prettier)
                          # no time limit — large/minified bundles run to completion

# Stage 5: Client-Side JavaScript Analysis (semgrep + DOM heuristics)
js_analysis:
  enabled: true
  timeout: 0              # per-directory semgrep timeout (0 = no limit)
  dom_scan: true          # regex DOM source/sink/postMessage/listener heuristics
  # configs:              # override the semgrep rule packs (default: a broad set)
  #   - p/owasp-top-ten
  #   - p/secrets
  #   - p/xss

# Stage 6: Cloud Infrastructure
cloud:
  cloud_enum:
    timeout: 0            # no timeout — cloud_enum brute-forces many providers
    extra_args: []
    # extra_args: ["-l", "/opt/wordlists/cloud_enum_mutations.txt"]

  pycroburst:
    timeout: 0            # no timeout — Azure brute-force can run long
    mutations: 200
    wordlist: ""          # path to custom wordlist
    extra_args: []

# Stage 7: Email & Username Enumeration
email:
  phonebooks:
    api_key: ""           # optional - get from phonebook.cz
    max_pages: 5

  linkedin2username:
    timeout: 300
    cookie: ""            # LinkedIn li_at session cookie (required)
    extra_args: []
    # extra_args: ["-s", "50", "-sleep", "2"]

# Stage 8: Exposure & Secrets Discovery (LeakIX, Gitminer3, Google dorks)
exposure:
  leakix:
    # Queried programmatically via the LeakIX JSON API.
    # API key: set here, or via the LEAKIX_API_KEY environment variable.
    api_key: ""
    timeout: 60           # HTTP timeout (seconds)
    max_pages: 3          # pages to fetch (~20 events/page; ~1 req/s rate limit)

  gitminer:
    enabled: true
    github_token: ""      # GitHub PAT; falls back to GITHUB_TOKEN env var
    timeout: 1200

  google_dorks:
    enabled: true         # requires the `claude` CLI with --chrome
    batch_size: 5         # dorks per Claude browser task (ALL dorks are always run)
    permission_mode: acceptEdits
    max_turns: 30         # bound agent iterations per batch
    max_budget_usd: 2.0   # bound spend per batch
    timeout: 600          # per-batch timeout (seconds)

# Optional pre-step: IP -> FQDN resolution (enabled with --ip-list / -i)
ip_resolve:
  workers: 20             # concurrent reverse-DNS lookups
  timeout: 5              # per-lookup DNS timeout (seconds)
  feed_subdomains: true   # fold FCrDNS-validated FQDNs into the subdomain pool
  max_cidr_hosts: 4096    # safety cap when expanding a CIDR range

# Global settings
global:
  max_concurrency: 4      # max parallel tool runs
  output_base: "output"   # base directory for all run outputs
  progress_interval: 30   # seconds between "tools still running" heartbeats (0 to disable)
